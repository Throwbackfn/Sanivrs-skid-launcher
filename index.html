<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Throwback - OG Fortnite Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 60px 20px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(114, 137, 218, 0.4);
        }

        .subtitle {
            color: #aaa;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 90%;
        }

        .outline-btn {
            display: inline-block;
            padding: 15px 45px;
            border: 2px solid #7289da;
            background: transparent;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 5px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
            width: 100%;
        }

        .outline-btn:hover:not(:disabled) {
            background-color: #7289da;
            box-shadow: 0 0 25px rgba(114, 137, 218, 0.6);
        }

        .outline-btn:disabled {
            border-color: #333;
            color: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #user-profile {
            margin-bottom: 20px;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #username {
            color: #7289da;
            font-weight: bold;
        }

        .hidden { display: none; }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <header>
        <h1>Throwback</h1>
        <p class="subtitle">Authentication required for download</p>
    </header>

    <main class="main-container">
        <div class="auth-card">
            <div id="login-section">
                <p>Please log in with Discord</p>
                <button id="discord-login-btn" class="outline-btn">Login</button>
            </div>

            <div id="user-profile" class="hidden">
                <p>Authenticated as: <span id="username">User</span></p>
            </div>

            <button id="download-launcher" class="outline-btn" disabled>
                Download Launcher
            </button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 THROWBACK PROJECT. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        // Data provided by user
        const CLIENT_ID = '1445078711417307240'; 
        const REDIRECT_URI = 'https://throwbackfn.github.io/Sanivrs-skid-launcher/'; 
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1495410045574184980/LsLJLxZd2ML7jG6w2n4iiBrPKvFhqxpV1RqbmsZ5Vbj39tqLzd7XKtCf-G5gxCWfjcmQ';

        const loginBtn = document.getElementById('discord-login-btn');
        const downloadBtn = document.getElementById('download-launcher');
        const userProfile = document.getElementById('user-profile');
        const loginSection = document.getElementById('login-section');
        const usernameSpan = document.getElementById('username');

        // Check for token in URL hash
        window.onload = () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (accessToken) {
                // Clean URL hash
                window.history.replaceState({}, document.title, window.location.pathname);
                fetchUserData(accessToken);
            }
        };

        // Login logic
        loginBtn.addEventListener('click', () => {
            const scope = 'identify';
            // Implicit grant flow using response_type=token
            const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${scope}`;
            window.location.href = authUrl;
        });

        // Get user info and unlock button
        function fetchUserData(token) {
            fetch('https://discord.com/api/users/@me', {
                headers: { Authorization: `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(user => {
                if (user.username) {
                    usernameSpan.innerText = user.username;
                    loginSection.classList.add('hidden');
                    userProfile.classList.remove('hidden');
                    
                    // UNLOCK BUTTON
                    downloadBtn.disabled = false;
                    downloadBtn.style.borderColor = "#43b581"; 
                    downloadBtn.innerText = "Start Download";

                    downloadBtn.onclick = () => {
                        sendWebhook(user.username);
                        alert("Launcher download starting...");
                        // window.location.href = "YOUR_DOWNLOAD_LINK_HERE";
                    };
                }
            })
            .catch(err => {
                console.error("Auth Error:", err);
                alert("Authentication failed. Please try again.");
            });
        }

        // Send Discord Webhook Embed
        function sendWebhook(name) {
            const payload = {
                "embeds": [{
                    "title": "🚀 Launcher Downloaded",
                    "description": `**${name}** has successfully downloaded the launcher.`,
                    "color": 5763719, // Success Green
                    "timestamp": new Date().toISOString(),
                    "footer": { "text": "Throwback Launcher Logs" }
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
    </script>
</body>
</html>
